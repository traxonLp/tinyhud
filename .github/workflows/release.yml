name: Build & Release

# Builds the mod and attaches the jar(s) to a GitHub Release.
# Triggers when you push a version tag (e.g. v1.0.0), and can also be run
# manually from the Actions tab (manual runs build + upload an artifact but
# do not create a Release).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # required to create/update the Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      # Always available for manual/dispatch runs and for inspecting any build.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyhud-jars
          path: build/libs/*.jar
          if-no-files-found: error

      # Only when triggered by a version tag: publish a Release with the jar(s).
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
